<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION DEX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{margin:0;font-family:Inter;background:#040814;color:#fff}
.container{width:90%;max-width:1200px;margin:auto}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.brand img{width:40px}
.btn{padding:12px 18px;border-radius:20px;border:none;cursor:pointer}
.btn-gold{background:gold;color:black;font-weight:bold}

/* HERO */
.hero{padding:60px 0}
.card{background:#0b1224;padding:20px;border-radius:16px;margin-bottom:20px}

/* FIX 1: CONNECTED SWAP BOX HEIGHT */
.hero-swap-panel{
padding-bottom:40px;
}

/* FIX 2: WALLET GRID OVERFLOW */
.wallet-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
.wallet-tile{
font-size:12px;
padding:10px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

/* MARKET BAR */
.market{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}
.market div{
background:#0b1224;
padding:12px;
border-radius:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="nav">

<!-- ✅ GÜNCELLENDİ -->
<a class="brand" href="https://axiondefi.com/" target="_blank">
<img src="https://raw.githubusercontent.com/axionteam645/axion-dashboard/main/axion-logo.png">
<div>
<strong>AXION DEX</strong><br>
<small>Intelligent Layer for DeFi</small>
</div>
</a>

<button class="btn btn-gold">Connect Wallet</button>

</div>

<!-- HERO -->
<div class="hero">

<h1>AXION DEX</h1>
<p>Swap. Route. Provide Liquidity.</p>

<div class="market">
<div>Pair<br><strong>AX / BNB</strong></div>
<div>Price<br><strong id="price">-</strong></div>
<div>Reserve AX<br><strong id="rax">-</strong></div>
<div>Reserve BNB<br><strong id="rbnb">-</strong></div>
<div>Total LP<br><strong id="lp">-</strong></div>
</div>

</div>

<!-- SWAP PANEL -->
<div class="card hero-swap-panel">
<h3>OPEN CONNECTED SWAP</h3>
<p>Import any token and trade instantly</p>
<button class="btn btn-gold">OPEN CONNECTED SWAP</button>
</div>

<!-- WALLET -->
<div class="card">
<h3>Connected Wallet</h3>

<div class="wallet-grid">
<div class="wallet-tile">Address<br>0x...</div>
<div class="wallet-tile">Network<br>BNB</div>
<div class="wallet-tile">Status<br>Synced</div>
</div>

<div class="wallet-grid">
<div class="wallet-tile">BNB<br>0.00</div>
<div class="wallet-tile">AX<br>0.00</div>
<div class="wallet-tile">Allowance<br>0</div>
</div>

</div>

</div>

<script>

// DEXSCREENER DATA
async function loadData(){
try{
const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/0xb7d69e285583f8b444a85a0ab68d24d63ce537de");
const data = await res.json();
const pair = data.pair;

document.getElementById("price").innerText = "$" + pair.priceUsd;
document.getElementById("rax").innerText = pair.baseToken.symbol + " " + pair.liquidity.base;
document.getElementById("rbnb").innerText = "BNB " + pair.liquidity.quote;
document.getElementById("lp").innerText = "$" + pair.liquidity.usd;

}catch(e){
console.log("price error",e);
}
}

loadData();
setInterval(loadData,10000);

</script>

</body>
</html>
